<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapLoad - Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-green {
            background: rgba(20, 83, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        .shimmer {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px #fff); }
            to { filter: drop-shadow(0 0 15px #22c55e); }
        }
        /* Button loading animation */
        .loading { cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center p-6">

    <div class="flex gap-10 mb-10 text-6xl py-10">
        <i class="fab fa-youtube text-red-600 shimmer"></i>
        <i class="fab fa-instagram text-pink-500 shimmer"></i>
        <i class="fab fa-facebook text-blue-600 shimmer"></i>
    </div>

    <div class="w-full max-w-2xl glass-green p-8 rounded-3xl">
        <h2 class="text-2xl font-bold mb-4 text-center">Video Link Paste Karein</h2>
        <input type="text" id="videoUrl" placeholder="Paste YouTube, Insta, or FB link..." 
               class="w-full p-4 bg-gray-900 border border-green-500 rounded-xl text-white outline-none focus:ring-2 focus:ring-green-400">
        
        <button onclick="fetchVideo()" id="btn" class="w-full mt-6 bg-gradient-to-r from-green-500 to-green-700 p-4 rounded-xl font-bold text-xl hover:scale-105 transition active:scale-95">
            GET VIDEO INFO
        </button>
    </div>

    <div id="result" class="hidden w-full max-w-2xl mt-10 glass-green p-6 rounded-3xl flex flex-col md:flex-row gap-6">
        <img id="thumb" src="" class="w-full md:w-48 rounded-2xl border-2 border-green-400 object-cover shadow-lg">
        <div class="flex-1 flex flex-col justify-between">
            <div>
                <h3 id="resTitle" class="text-xl font-bold mb-2 text-green-300">Video Mil Gayi!</h3>
                <p class="text-gray-300 text-sm">Niche diye gaye Blue button se download karein.</p>
            </div>
            
            <a id="dl_link" href="#" target="_blank" class="bg-gradient-to-r from-blue-600 to-cyan-500 p-4 rounded-xl text-center font-bold text-lg mt-6 shadow-lg shadow-blue-500/50 hover:brightness-110 transition">
                <i class="fas fa-download mr-2"></i> DOWNLOAD NOW
            </a>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if(!url) { alert("Bhai, pehle link toh daalo!"); return; }

            // Loading state
            btn.innerText = "WAITING FOR SERVER...";
            btn.classList.add('loading');
            btn.disabled = true;
            resultDiv.classList.add('hidden');

            try {
                // Fix: Using a proxy to bypass GitHub Pages CORS security
                const proxy = "https://corsproxy.io/?";
                const apiTarget = "https://api.cobalt.tools/api/json";

                const response = await fetch(proxy + encodeURIComponent(apiTarget), {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        vQuality: "720",
                        filenamePattern: "basic"
                    })
                });

                const data = await response.json();

                if (data.status === 'stream' || data.status === 'redirect' || data.status === 'picker') {
                    const finalUrl = data.url || (data.picker && data.picker[0].url);
                    
                    // Result Display
                    resultDiv.classList.remove('hidden');
                    document.getElementById('dl_link').href = finalUrl;
                    
                    // Smart Thumbnail Logic
                    if(url.includes('youtube.com') || url.includes('youtu.be')) {
                        let vid = "";
                        if(url.includes('v=')) vid = url.split('v=')[1].split('&')[0];
                        else vid = url.split('/').pop().split('?')[0];
                        document.getElementById('thumb').src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
                        document.getElementById('resTitle').innerText = "YouTube Video Ready!";
                    } else if(url.includes('instagram.com')) {
                        document.getElementById('thumb').src = "https://cdn-icons-png.flaticon.com/512/174/174855.png";
                        document.getElementById('resTitle').innerText = "Instagram Reel Ready!";
                    } else {
                        document.getElementById('thumb').src = "https://cdn-icons-png.flaticon.com/512/1179/1179069.png";
                        document.getElementById('resTitle').innerText = "Video Found!";
                    }
                } else {
                    alert("Koshish fail! Shayad ye link private hai ya API busy hai.");
                }
            } catch (err) {
                console.error(err);
                alert("Server issue! Ek baar page refresh karke try karein.");
            } finally {
                btn.innerText = "GET VIDEO INFO";
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
