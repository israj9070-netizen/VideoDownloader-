<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDownloader - YouTube, Insta, FB Video Saver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Custom gradient animations */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-animate {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="#" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                <i class="fas fa-download mr-2"></i>SnapLoad
            </a>
            <div class="flex items-center gap-4 text-sm text-gray-400">
                <a href="#dmca" class="hover:text-white">DMCA</a>
                <a href="#contact" class="hover:text-white">Contact</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col items-center pt-16 px-4">
        
        <h1 class="text-5xl md:text-6xl font-extrabold mb-4 text-center tracking-tight bg-animate text-transparent bg-clip-text">
            All-in-One Downloader
        </h1>
        <p class="mb-10 text-xl text-gray-400 text-center max-w-xl">
            Save videos from your favorite platforms instantly!
        </p>

        <div class="w-full max-w-3xl bg-green-950 p-8 rounded-3xl shadow-2xl border-4 border-green-700">
            
            <div class="flex justify-center gap-10 mb-8 text-5xl">
                <div class="text-red-600 hover:scale-110 transition-transform cursor-pointer tooltip" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </div>
                <div class="text-transparent bg-clip-text bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 hover:scale-110 transition-transform cursor-pointer tooltip" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="text-blue-600 hover:scale-110 transition-transform cursor-pointer tooltip" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="urlInput" placeholder="Paste YouTube, Instagram, or FB link here..." 
                       class="w-full p-5 bg-gray-900 border-2 border-green-600 rounded-xl focus:ring-4 focus:ring-purple-500 outline-none text-white text-lg placeholder-gray-600 pr-32">
                
                <button id="fetchBtn" onclick="fetchVideoInfo()"
                        class="absolute right-2 top-2 bottom-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold px-6 rounded-lg hover:scale-105 transition-transform flex items-center gap-2">
                    <div id="btnSpinner" class="loading-spinner hidden"></div>
                    <span id="btnText">Fetch Info</span>
                </button>
            </div>
        </div>

        <div id="resultArea" class="w-full max-w-3xl mt-10 hidden">
            <div class="bg-green-900/60 p-6 rounded-3xl border-4 border-green-600 shadow-xl">
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <div class="w-full md:w-1/2 rounded-xl overflow-hidden border-2 border-gray-700 shadow-md">
                        <img id="videoThumbnail" src="" alt="Video Thumbnail" class="w-full object-cover">
                    </div>
                    
                    <div class="w-full md:w-1/2 flex flex-col justify-between py-2 text-center md:text-left">
                        <div>
                            <span class="inline-block bg-purple-700 text-xs px-3 py-1 rounded-full font-semibold mb-2">Video Found!</span>
                            <h2 id="videoTitle" class="text-2xl font-bold text-gray-100 leading-tight mb-4">
                                Loading title...
                            </h2>
                        </div>
                        
                        <a id="downloadLink" href="#" target="_blank"
                           class="w-full text-center bg-gradient-to-r from-blue-600 to-cyan-500 text-white p-5 rounded-xl text-xl font-extrabold hover:from-cyan-500 hover:to-blue-600 transform hover:-translate-y-1 transition-all shadow-lg hover:shadow-cyan-500/50">
                            <i class="fas fa-cloud-download-alt mr-2"></i>DOWNLOAD NOW
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-3xl mt-12 bg-gray-900 p-4 text-center rounded-xl border border-gray-800 text-gray-700 text-xs">
            ADSTERRA NATIVE AD (Code Yahan Paste Karein)
        </div>

        <footer class="w-full mt-24 py-10 border-t border-gray-800 bg-gray-950 text-gray-600 text-center text-sm">
            &copy; 2025 SnapLoad. For personal use only. DMCA Protected.
        </footer>
    </main>

    <script>
        function fetchVideoInfo() {
            const urlInput = document.getElementById('urlInput').value;
            const resultArea = document.getElementById('resultArea');
            const fetchBtn = document.getElementById('fetchBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // 1. Basic validation
            if (!urlInput || !urlInput.includes('http')) {
                alert("Bhai, sahi link toh daalo!");
                return;
            }

            // 2. Start loading state
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            fetchBtn.disabled = true;
            resultArea.classList.add('hidden');

            // 3. Make the API Call to your main.py
            fetch('/get_video_info', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ url: urlInput }),
            })
            .then(response => response.json())
            .then(data => {
                // 4. End loading state
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                fetchBtn.disabled = false;

                if (data.status === 'success') {
                    // 5. Update Result Area with real info
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoThumbnail').src = data.thumbnail;
                    document.getElementById('downloadLink').href = data.download_url;
                    
                    // 6. Show the result in a hara container
                    resultArea.classList.remove('hidden');
                } else {
                    alert("Error: " + data.message + "\n\nBhai, lagta hai block ho gaya hai. Ad check karo!");
                }
            })
            .catch((error) => {
                console.error('Error:', error);
                alert("Koshish fail ho gayi! Server issue hai.");
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                fetchBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
