<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Downloader - Fast & Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center px-4">
        <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
            Super Downloader
        </h1>
        <p class="mb-8 text-gray-400">Download from YouTube, Instagram & FB in one click!</p>

        <div class="w-full max-w-2xl bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
            <input type="text" id="url" placeholder="Paste link here..." 
                   class="w-full p-4 bg-gray-700 border-none rounded-lg focus:ring-2 focus:ring-purple-500 outline-none text-white">
            <button onclick="downloadVideo()" 
                    class="w-full mt-4 bg-gradient-to-r from-purple-600 to-pink-600 p-4 rounded-lg font-bold hover:scale-105 transition-transform">
                Fetch Video
            </button>
        </div>

        <div id="ad-slot" class="mt-10 p-4 border border-dashed border-gray-600 text-gray-500">
            ADSTERRA ADS HERE
        </div>
    </div>
</body>
</html>
